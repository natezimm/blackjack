name: CI & Deploy

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install root quality dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run quality gate
        run: npm run quality

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts || true
          ssh-keyscan ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts || true

          cat <<EOF > ~/.ssh/config
          Host lightsail
            HostName ${{ secrets.LIGHTSAIL_HOST }}
            User ${{ secrets.LIGHTSAIL_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking=no
          EOF

      - name: Deploy to Lightsail
        run: |
          ssh lightsail "bash -s" <<'EOF'
          set -euo pipefail

          repo_dir=$(
            find "$HOME" -maxdepth 4 -type d -name .git -print 2>/dev/null |
              while IFS= read -r git_dir; do
                work_tree=${git_dir%/.git}
                remote_url=$(git -C "$work_tree" config --get remote.origin.url 2>/dev/null || true)

                case "$remote_url" in
                  *natezimm/blackjack*)
                    printf '%s\n' "$work_tree"
                    break
                    ;;
                esac
              done
          )

          if [ -n "$repo_dir" ] &&
             [ -e "$repo_dir/package-lock.json" ] &&
             ! git -C "$repo_dir" ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            rm -f "$repo_dir/package-lock.json"
          fi
          EOF

          ssh lightsail "bash ~/deploy-scripts/deploy-${{ github.event.repository.name }}.sh"

      - name: Health check (frontend + backend)
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          app_domain="$(printf '%s' "${APP_DOMAIN:-}" | tr -d '[:space:]')"
          app_domain="${app_domain#https://}"
          app_domain="${app_domain#http://}"
          app_domain="${app_domain%/}"

          if [ -z "$app_domain" ]; then
            echo "APP_DOMAIN secret is empty"
            exit 1
          fi

          echo "Waiting for services to start..."
          sleep 10

          echo "Checking frontend..."
          curl --fail --location --show-error --silent --output /dev/null "https://${app_domain}/" || {
            echo "Frontend health check failed"
            exit 1
          }

          echo "Checking backend..."
          backend_response="$(curl --fail --location --show-error --silent "https://${app_domain}/api/blackjack/health")" || {
            echo "Backend health check failed"
            exit 1
          }

          if ! printf '%s' "$backend_response" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' ||
             ! printf '%s' "$backend_response" | grep -Eq '"service"[[:space:]]*:[[:space:]]*"blackjack"'; then
            echo "Backend health check returned an unexpected response"
            printf '%s\n' "$backend_response"
            exit 1
          }

          echo "Deploy health check passed"
